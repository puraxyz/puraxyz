# strfry.conf — minimal config for local development and production
#
# Full reference: https://github.com/hoytech/strfry/blob/master/strfry.conf
#
# In Docker, mount this at /etc/strfry.conf
# In production, put behind Caddy/nginx for TLS

db = "./strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777

    info {
        name = "Pura NVM Relay"
        description = "Agent economy routing relay — Nostr Virtual Machine"
        contact = "erik@pura.xyz"
    }

    # Max WebSocket message size (1MB, enough for NVM events)
    maxWebsocketPayloadSize = 1048576

    # Max events returned per REQ
    maxFilterLimit = 500
}

events {
    # Max event size in bytes
    maxEventSize = 65536

    # How long to keep ephemeral events (seconds). 0 = forever.
    ephemeralEventsLifetimeSeconds = 300
}
